<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body, iframe { width: 100%; height: 100%; margin: 0; border: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <iframe id="site" src="/"></iframe>
    <script>
      const frame = document.getElementById('site');
      frame.addEventListener('load', () => {
        setTimeout(() => {
          frame.contentWindow.scrollTo({ top: 1700, behavior: 'auto' });
        }, 1200);
      });
    </script>
  </body>
</html>
